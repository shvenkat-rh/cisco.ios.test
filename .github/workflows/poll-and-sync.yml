name: Poll and Sync Issues

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: "Ignore saved timestamp — re-sync all issues and comments"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Only one sync run at a time to avoid state-file conflicts.
concurrency:
  group: issue-sync
  cancel-in-progress: false

env:
  # ──────────────────────────────────────────────
  #  CHANGE THIS to the repo you want to mirror
  # ──────────────────────────────────────────────
  SOURCE_REPO: "owner/repo"

permissions:
  contents: write    # commit state.json back to the repo
  issues: write      # create mirrored issues and comments

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REPO: ${{ env.SOURCE_REPO }}
          FORCE_FULL_SYNC: ${{ github.event.inputs.force_full_sync || 'false' }}
        run: python .github/scripts/sync.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet && echo "No state changes" && exit 0
          git commit -m "chore: update sync state"
          git push
